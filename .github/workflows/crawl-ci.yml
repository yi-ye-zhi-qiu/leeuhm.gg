# https://github.com/docker/login-action#azure-container-registry-acr
# 1. Generate `AZURE_CLIENT_ID`, the service principal's ID and AZURE_CLIENT_SECRET, 
#    the service principal's secret 
# 2. Go to Azure ACR (after backend configured) and grab registry;
#    this looks something like <registry-name>.azurecr.io

name: Docker CI
on:
  push:
    branches: main

env:
  IMAGE_NAME: crawler

jobs:
  login:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      - name: Login to Azure Container Registry (ACR)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY }}
          username: ${{ secrets.AZURE_CLIENT_ID }}
          password: ${{ secrets.AZURE_CLIENT_SECRET }}
      - name: Build & Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.AZURE_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
